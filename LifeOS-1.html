<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#020617;color:#f1f5f9;font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:#0f172a}
::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
input,select,button,textarea{font-family:inherit;-webkit-appearance:none}
input[type=range]{-webkit-appearance:none;height:4px;border-radius:2px;background:#1e293b;cursor:pointer;outline:none;width:100%}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#8b5cf6;border:2px solid #020617;cursor:pointer}
/* Layout */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}
#topbar{background:#0f172a;border-bottom:1px solid #1e293b;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:50}
#page{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:80px}
#bottomnav{position:fixed;bottom:0;left:0;right:0;background:#0f172a;border-top:1px solid #1e293b;display:flex;align-items:stretch;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px 6px;cursor:pointer;border:none;background:none;color:#475569;font-size:10px;font-weight:600;gap:3px;transition:color .2s;min-width:0}
.bnav-item.active{color:#8b5cf6}
.bnav-item .bnav-icon{font-size:20px;line-height:1}
.bnav-item .bnav-dot{width:4px;height:4px;border-radius:50%;background:#8b5cf6;margin-top:1px;opacity:0;transition:opacity .2s}
.bnav-item.active .bnav-dot{opacity:1}
/* Page containers */
.page-wrap{padding:18px 16px;max-width:720px;margin:0 auto}
/* Cards */
.card{background:#0f172a;border:1px solid #1e293b;border-radius:16px;padding:16px}
/* Buttons */
.btn{border:none;border-radius:12px;cursor:pointer;font-weight:700;font-size:14px;padding:12px 20px;display:inline-flex;align-items:center;justify-content:center;gap:6px;transition:all .15s;white-space:nowrap;letter-spacing:.01em}
.btn-primary{background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;box-shadow:0 4px 16px rgba(124,58,237,.35)}
.btn-ghost{background:rgba(255,255,255,.05);color:#94a3b8;border:1px solid #1e293b}
.btn-danger{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.28)}
.btn-success{background:rgba(16,185,129,.14);color:#34d399;border:1px solid rgba(16,185,129,.28)}
.btn-sm{padding:7px 14px;font-size:12px;border-radius:10px}
.btn-full{width:100%}
/* Form */
.inp{width:100%;background:#1e293b;border:1px solid #334155;border-radius:11px;padding:11px 14px;color:#f1f5f9;font-size:14px;outline:none;transition:border-color .15s}
.inp:focus{border-color:#8b5cf6}
.inp-err{border-color:#ef4444!important}
.sel{width:100%;background:#1e293b;border:1px solid #334155;border-radius:11px;padding:11px 14px;color:#f1f5f9;font-size:14px;outline:none;cursor:pointer}
.lbl{display:block;font-size:12px;font-weight:600;color:#94a3b8;margin-bottom:6px}
.field{margin-bottom:14px}
.err-msg{color:#f87171;font-size:11px;margin-top:4px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
/* Overlay / Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:flex-end;justify-content:center;padding:0}
.overlay.center{align-items:center;padding:16px}
.sheet{background:#0f172a;border:1px solid #1e293b;border-radius:24px 24px 0 0;width:100%;max-width:560px;max-height:92vh;overflow:hidden;display:flex;flex-direction:column}
.sheet.modal{border-radius:20px;margin:16px}
.sheet-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #1e293b;flex-shrink:0}
.sheet-body{padding:20px;overflow-y:auto;flex:1}
.sheet-foot{padding:16px 20px;border-top:1px solid #1e293b;display:flex;gap:10px;flex-shrink:0}
.close-x{background:none;border:none;color:#64748b;cursor:pointer;font-size:24px;line-height:1;padding:0 4px;border-radius:6px}
/* Badges */
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:99px;font-size:11px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:all .2s;white-space:nowrap}
.bdone{background:rgba(16,185,129,.12);color:#34d399;border:1px solid rgba(16,185,129,.35)}
.bpend{background:rgba(30,41,59,.8);color:#64748b;border:1px solid rgba(100,116,139,.25)}
/* Tag */
.tag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;display:inline-block}
/* Progress */
.pbar-wrap{height:5px;background:#1e293b;border-radius:99px;overflow:hidden}
.pbar{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1)}
/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:none}}
@keyframes slideR{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:none}}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(139,92,246,.5)}70%{box-shadow:0 0 0 14px rgba(139,92,246,0)}100%{box-shadow:0 0 0 0 rgba(139,92,246,0)}}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fu{animation:fadeUp .3s ease both}
.su{animation:slideUp .3s ease both}
.sr{animation:slideR .2s ease both}
.pulse{animation:pulse 2.5s infinite}
.bob{animation:bob 3s ease-in-out infinite}
/* Ring */
.ring-wrap{position:relative;flex-shrink:0}
.ring-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
/* Histogram bar */
.hbar-group{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.hbar-col{width:100%;display:flex;flex-direction:column-reverse;align-items:center;gap:2px}
.hbar-seg{width:70%;border-radius:3px 3px 0 0;min-height:2px;transition:height .5s}
.hbar-lbl{font-size:9px;color:#475569;text-align:center;font-weight:500}
/* Confirm */
.confirm-box{background:#0f172a;border:1px solid #1e293b;border-radius:20px;padding:24px;max-width:340px;width:100%}
/* Premium cards */
.plan-card{border-radius:20px;padding:22px;position:relative;overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s}
.plan-card:hover{transform:translateY(-2px)}
.plan-card.featured{box-shadow:0 0 0 2px #8b5cf6,0 16px 40px rgba(139,92,246,.3)}
/* Toast */
.toast-wrap{position:fixed;bottom:90px;right:12px;z-index:9999;display:flex;flex-direction:column;gap:8px;max-width:310px;width:calc(100% - 24px);pointer-events:none}
.toast{border-radius:14px;padding:12px 16px;display:flex;gap:10px;align-items:flex-start;backdrop-filter:blur(20px);box-shadow:0 8px 28px rgba(0,0,0,.45);pointer-events:all;animation:slideR .25s ease}
/* Auth */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:#020617}
.auth-card{background:#0f172a;border:1px solid #1e293b;border-radius:24px;padding:32px 28px;width:100%;max-width:420px;box-shadow:0 24px 60px rgba(0,0,0,.6)}
/* Spinner */
.spin-icon{animation:spin .7s linear infinite;display:inline-block}
</style>

const PLAN_CONFIG = {
  trial:    { name:'Trial',    emoji:'🎁', color:'#fbbf24', limit:10, charts:false, analysis:false, export:false, reminders:false, themes:false, report:false, streakBonus:false, priority:0 },

};

function currentPlanId() {
  if (!APP.user) return null;
  // Trial check
  const created = new Date(APP.user.createdAt);
  const trialEnd = new Date(created.getTime() + 15*24*60*60*1000);
  if (!APP.premium && new Date() <= trialEnd) return 'trial';
  if (!APP.premium) return null; // expirado sem plano pago
  if (APP.premium.plan === 'lifetime') return 'lifetime';
  if (APP.premium.expiresAt && new Date() <= new Date(APP.premium.expiresAt)) return APP.premium.plan;
  return null; // plano expirado
}

function currentPlan() {
  const id = currentPlanId();
  return id ? PLAN_CONFIG[id] : null;
}

function isPremiumActive() {
  return currentPlanId() !== null;
}

function canAccess(feature) {
  const plan = currentPlan();
  if (!plan) return false;
  return !!plan[feature];
}

function getLimit() {
  const plan = currentPlan();
  return plan ? plan.limit : 0;
}

function trialDaysLeft() {
  if (!APP.user) return 0;
  const created = new Date(APP.user.createdAt);
  const trialEnd = new Date(created.getTime() + 15*24*60*60*1000);
  return Math.max(0, Math.ceil((trialEnd - new Date()) / 864e5));
}

function isOnTrial() {
  return currentPlanId() === 'trial';
}

function isExpired() {
  return APP.user && currentPlanId() === null;
}

async function authRegister(name, email, password) {
  const { data, error } = await sb.auth.signUp({
    email, password, options: { data: { name } }
  });
  if (error) return { error: traduzErro(error) };
  const user = { id: data.user.id, name, email, createdAt: data.user.created_at };
  await loadUserData(user);
  return { user };
}

async function authLogin(email, password) {
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) return { error: traduzErro(error) };
  const { data: prof } = await sb.from('profiles').select('name,created_at').eq('id', data.user.id).single();
  const user = { id: data.user.id, name: prof?.name || data.user.user_metadata?.name || '', email: data.user.email, createdAt: prof?.created_at || data.user.created_at };
  await loadUserData(user);
  return { user };
}

function traduzErro(error) {
  const m = error.message || '';
  if (m.includes('already registered')) return 'Este e-mail já está cadastrado.';
  if (m.includes('Invalid login credentials')) return 'E-mail ou senha incorretos.';
  if (m.includes('Password should be')) return 'A senha deve ter no mínimo 6 caracteres.';
  return m || 'Ocorreu um erro. Tente novamente.';
}

// Busca (ou semeia) os dados do usuário no Supabase
async function loadUserData(user) {
  APP.user = user;
  const uidv = user.id;
  const [tasksR, habitsR, goalsR, eventsR, premiumR] = await Promise.all([
    sb.from('tasks').select('*').eq('user_id', uidv),
    sb.from('habits').select('*').eq('user_id', uidv),
    sb.from('goals').select('*').eq('user_id', uidv),
    sb.from('events').select('*').eq('user_id', uidv),
    sb.from('premium').select('*').eq('user_id', uidv).maybeSingle(),
  ]);
  APP.tasks  = (tasksR.data  && tasksR.data.length)  ? tasksR.data.map(stripUid)  : null;
  APP.habits = (habitsR.data && habitsR.data.length) ? habitsR.data.map(stripUid) : null;
  APP.goals  = (goalsR.data  && goalsR.data.length)  ? goalsR.data.map(stripUid)  : null;
  APP.events = (eventsR.data && eventsR.data.length) ? eventsR.data.map(stripUid) : null;
  APP.premium = premiumR.data ? { plan: premiumR.data.plan, activatedAt: premiumR.data.activated_at, expiresAt: premiumR.data.expires_at } : null;
  initUserData(); // semeia com dados de exemplo se algo vier vazio (só na primeira vez)
  await saveUserData(); // garante que os dados semeados fiquem gravados no Supabase
}

function stripUid(row) { const { user_id, ...rest } = row; return rest; }

// Grava o estado atual (tasks/habits/goals/events/premium) no Supabase.
// Estratégia simples: substitui todas as linhas do usuário em cada tabela.
async function saveUserData() {
  if (!APP.user) return;
  const uidv = APP.user.id;
  try {
    await Promise.all([
      syncTable('tasks',  APP.tasks,  uidv),
      syncTable('habits', APP.habits, uidv),
      syncTable('goals',  APP.goals,  uidv),
      syncTable('events', APP.events, uidv),
    ]);
    if (APP.premium) {
      await sb.from('premium').upsert({ user_id: uidv, plan: APP.premium.plan, activated_at: APP.premium.activatedAt, expires_at: APP.premium.expiresAt });
    } else {
      await sb.from('premium').delete().eq('user_id', uidv);
    }
  } catch (e) {
    toast('Falha ao sincronizar com o Supabase. Verifique sua conexão.', 'error');
  }
}

async function syncTable(table, rows, uidv) {
  await sb.from(table).delete().eq('user_id', uidv);
  if (rows && rows.length) {
    await sb.from(table).insert(rows.map(r => ({ ...r, user_id: uidv })));
  }
}

async function logout() {
  await saveUserData();
  await sb.auth.signOut();
  APP.user = null; APP.tab = 'dashboard';
  APP.tasks = APP.habits = APP.goals = APP.events = APP.premium = null;
  S.del('los_tab');
  render();
}

function toast(msg, type='success') {
  const cols = {
    success:['rgba(16,185,129,.13)','rgba(16,185,129,.4)'],
    error:  ['rgba(239,68,68,.13)', 'rgba(239,68,68,.4)'],
    info:   ['rgba(139,92,246,.13)','rgba(139,92,246,.4)'],
    warning:['rgba(251,191,36,.13)','rgba(251,191,36,.4)'],
  };
  const [bg,bd]=cols[type]||cols.info;
  const el=document.createElement('div');
  el.className='toast';
  el.style.cssText=`background:${bg};border:1px solid ${bd}`;
  el.innerHTML=`<span style="flex:1;font-size:13px;font-weight:500;color:#cbd5e1;line-height:1.4">${msg}</span><button onclick="this.parentNode.remove()" style="background:none;border:none;color:#64748b;cursor:pointer;font-size:20px;line-height:1">×</button>`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>{try{el.remove()}catch{}},4000);
}

// ════════════════════════════════════════════════════
// SVG RING
// ════════════════════════════════════════════════════
function ring(pct,size,stroke,color,bg,inner){
  const r=(size-stroke)/2, c=2*Math.PI*r, d=Math.max(0,Math.min(1,pct/100))*c;
  return `<div class="ring-wrap" style="width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}" style="transform:rotate(-90deg);position:absolute;top:0;left:0">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${bg||'#1e293b'}" stroke-width="${stroke}"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}"
        stroke-dasharray="${d.toFixed(1)} ${c.toFixed(1)}" stroke-linecap="round"
        style="transition:stroke-dasharray .7s"/>
    </svg>
    <div class="ring-center">${inner||''}</div>
  </div>`;
}

// ════════════════════════════════════════════════════
// HISTOGRAM (bar chart)
// ════════════════════════════════════════════════════
function histogram(data, keys, colors, labels, height=160) {
  const maxVal = Math.max(...data.flatMap(d=>keys.map(k=>d[k]||0)), 1);
  const yLines = [0,25,50,75,100].filter(v=>v<=maxVal+10);

  const bars = data.map(d=>{
    const segs = keys.map((k,i)=>`
      <div style="width:${Math.max(1,Math.floor(70/keys.length))}%;height:${Math.max(2,(d[k]||0)/maxVal*(height-40))}px;background:${colors[i]};border-radius:3px 3px 0 0;opacity:.85;transition:height .5s" title="${labels[i]}: ${d[k]||0}%"></div>
    `).join('');
    return `<div class="hbar-group">
      <div style="display:flex;align-items:flex-end;gap:2px;height:${height-40}px;width:100%;justify-content:center">${segs}</div>
      <div class="hbar-lbl">${d.week||d.label||''}</div>
    </div>`;
  }).join('');

  const legend = keys.map((k,i)=>`
    <span style="display:inline-flex;align-items:center;gap:5px;font-size:11px;color:#64748b">
      <span style="width:10px;height:10px;border-radius:2px;background:${colors[i]};display:inline-block"></span>${labels[i]}
    </span>`).join('');

  return `<div>
    <div style="display:flex;gap:4px;align-items:flex-end;height:${height}px;border-left:1px solid #1e293b;border-bottom:1px solid #1e293b;padding:0 4px 0 8px;position:relative">
      ${yLines.map(v=>`<div style="position:absolute;left:0;bottom:${(v/maxVal)*(height-40)+20}px;font-size:9px;color:#475569;line-height:1;transform:translateY(50%)">${v}</div>`).join('')}
      ${bars}
    </div>
    <div style="display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:12px">${legend}</div>
  </div>`;
}

// ════════════════════════════════════════════════════
// PERFORMANCE TRACKING — dados reais desde criação da conta
// Grava snapshot diário do score do utilizador
// ════════════════════════════════════════════════════

function getPerfKey() {
  return APP.user ? 'los_perf_' + APP.user.id : null;
}

function loadPerfData() {
  const key = getPerfKey();
  return key ? S.get(key, []) : [];
}

function savePerfData(data) {
  const key = getPerfKey();
  if (key) S.set(key, data);
}

// Calcula scores atuais e grava snapshot do dia
function recordTodayPerf() {
  if (!APP.user || !APP.tasks) return;
  const {tasks, habits, goals} = APP;
  const tS = tasks.length  ? Math.round(tasks.filter(t=>t.done).length/tasks.length*100)          : 0;
  const hS = habits.length ? Math.round(habits.filter(h=>h.done).length/habits.length*100)        : 0;
  const gS = goals.length  ? Math.round(goals.reduce((a,g)=>a+g.progress,0)/goals.length)         : 0;
  const score = Math.round(tS*.35 + hS*.40 + gS*.25);
  const today = new Date().toISOString().split('T')[0];

  let data = loadPerfData();
  // Upsert: um registo por dia
  const idx = data.findIndex(d => d.date === today);
  const entry = { date: today, tasks: tS, habits: hS, goals: gS, score };
  if (idx >= 0) { data[idx] = entry; } else { data.push(entry); }
  // Manter máximo 90 dias
  if (data.length > 90) data = data.slice(-90);
  savePerfData(data);
  return data;
}

// Formata data para label curto "DD/MM"
function fmtDateLabel(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;
}

// Gera dados do histograma agrupados por semana desde criação da conta
function getPerfHistData() {
  const data = loadPerfData();
  if (!data.length) return [];

  // Agrupar por semana
  const weeks = {};
  data.forEach(d => {
    const dt = new Date(d.date + 'T12:00:00');
    // Número da semana ISO
    const startOfYear = new Date(dt.getFullYear(), 0, 1);
    const weekNum = Math.ceil(((dt - startOfYear) / 86400000 + startOfYear.getDay() + 1) / 7);
    const key = `${dt.getFullYear()}-W${String(weekNum).padStart(2,'0')}`;
    if (!weeks[key]) {
      weeks[key] = { label: fmtDateLabel(d.date), tasks: [], habits: [], goals: [], scores: [] };
    }
    weeks[key].tasks.push(d.tasks);
    weeks[key].habits.push(d.habits);
    weeks[key].goals.push(d.goals);
    weeks[key].scores.push(d.score);
  });

  const avg = arr => arr.length ? Math.round(arr.reduce((a,b)=>a+b,0)/arr.length) : 0;

  return Object.values(weeks).map(w => ({
    week: w.label,
    tasks: avg(w.tasks),
    habits: avg(w.habits),
    goals: avg(w.goals),
    score: avg(w.scores),
  }));
}

// Gera dados diários dos últimos N dias
function getPerfDailyData(days = 14) {
  const data = loadPerfData();
  const recent = data.slice(-days);
  return recent.map(d => ({
    week: fmtDateLabel(d.date),
    tasks: d.tasks,
    habits: d.habits,
    goals: d.goals,
    score: d.score,
  }));
}

function switchAuthMode(mode){ authMode=mode; renderAuth(); }

async function doRegister(){
  const name=(document.getElementById('auth-name').value||'').trim();
  const email=(document.getElementById('auth-email').value||'').trim();
  const pass=(document.getElementById('auth-pass').value||'');
  if(!name||!email||!pass){showAuthErr('Preencha todos os campos.');return;}
  if(pass.length<6){showAuthErr('A senha deve ter no mínimo 6 caracteres.');return;}
  setAuthLoading(true);
  const res=await authRegister(name,email,pass);
  setAuthLoading(false);
  if(res.error){showAuthErr(res.error);return;}
  toast(`Bem-vindo ao MiVida, ${name}! 🎉 Você tem 15 dias grátis.`,'success');
  render();
}
async function doLogin(){
  const email=(document.getElementById('auth-email').value||'').trim();
  const pass=(document.getElementById('auth-pass').value||'');
  if(!email||!pass){showAuthErr('Preencha todos os campos.');return;}
  setAuthLoading(true);
  const res=await authLogin(email,pass);
  setAuthLoading(false);
  if(res.error){showAuthErr(res.error);return;}
  toast(`Bem-vindo de volta, ${APP.user.name}! 👋`,'success');
  render();
}
function setAuthLoading(v){
  const btn=document.querySelector('#auth-form button.btn-primary');
  if(!btn) return;
  btn.disabled=v;
  btn.style.opacity=v?'.6':'1';
  if(v) btn.dataset.orig=btn.innerHTML, btn.innerHTML='<span class="spin-icon">⏳</span> Aguarde...';
  else if(btn.dataset.orig) btn.innerHTML=btn.dataset.orig;
}
function showAuthErr(msg){
  const el=document.getElementById('auth-err');
  if(el){el.textContent=msg;el.style.display='block';}
}

      <div style="position:absolute;top:6px;right:12px;font-size:36px;opacity:.07">✝</div>
      <p style="margin:0 0 3px;font-size:10px;font-weight:700;color:#8b5cf6;text-transform:uppercase;letter-spacing:.08em">📖 Palavra do dia</p>
      <p style="margin:0 0 7px;font-size:13px;color:#e2e8f0;line-height:1.6;font-style:italic">"${todayBible.t}"</p>
      <p style="margin:0;font-size:11px;font-weight:700;color:#7c3aed">— ${todayBible.r}</p>
    </div>

    <!-- Motivação -->
    <div style="background:linear-gradient(135deg,rgba(16,185,129,.1),rgba(20,184,166,.06));border:1px solid rgba(16,185,129,.22);border-radius:18px;padding:16px;margin-bottom:20px;position:relative;overflow:hidden" class="fu">
      <div style="position:absolute;top:6px;right:12px;font-size:32px;opacity:.08">💡</div>
      <p style="margin:0 0 3px;font-size:10px;font-weight:700;color:#10b981;text-transform:uppercase;letter-spacing:.08em">✨ Motivação do dia</p>
      <p style="margin:0 0 7px;font-size:13px;color:#e2e8f0;line-height:1.6;font-style:italic">"${todayQuote.t}"</p>
      <p style="margin:0;font-size:11px;font-weight:700;color:#059669">— ${todayQuote.a}</p>
    </div>

    <!-- KPIs -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px" class="fu">
      ${[['✅','Tarefas',`${tDone}/${tasks.length}`,tPct,'#8b5cf6','hoje'],['🔥','Hábitos',`${hDone}/${habits.length}`,hPct,'#f59e0b','habitos'],['🎯','Metas',`${gAvg}%`,gAvg,'#10b981','metas']].map(([ic,lb,vl,pt,cl,tb])=>`

        onmouseover="this.style.borderColor='${cl}60'" onmouseout="this.style.borderColor='#1e293b'">
        <p style="margin:0 0 2px;font-size:20px">${ic}</p>
        <p style="margin:0 0 4px;font-size:10px;color:#64748b">${lb}</p>
        <p style="margin:0 0 8px;font-size:16px;font-weight:900;color:${cl};font-family:monospace">${vl}</p>
        <div class="pbar-wrap"><div class="pbar" style="width:${pt}%;background:${cl}"></div></div>
      </div>`).join('')}
    </div>

    <!-- Mini histogram -->
    <div class="card fu" style="margin-bottom:20px">
      <h2 style="margin:0 0 4px;font-size:14px;font-weight:700;color:#e2e8f0">📊 Evolução semanal</h2>
      <p style="margin:0 0 16px;font-size:12px;color:#475569">Últimas semanas — tarefas, hábitos e metas</p>
      ${(()=>{const d=getPerfHistData();return d.length>=2?histogram(d.slice(-6),['tasks','habits','goals'],['#8b5cf6','#10b981','#f59e0b'],['Tarefas','Hábitos','Metas'],150):`<div style="text-align:center;padding:20px 0;color:#475569;font-size:13px">📈 O gráfico aparecerá conforme você usa o app todos os dias!</div>`;})()}

    <!-- Tarefas do dia -->
    <div style="background:#0f172a;border:1px solid #1e293b;border-radius:18px;overflow:hidden" class="fu">

        sorted.slice(0,4).map(t=>`
        <div style="padding:11px 16px;border-bottom:1px solid #0f172a;display:flex;align-items:center;gap:12px;opacity:${t.done?.55:1};background:${t.done?'#090d17':'#0f172a'}">
          <span style="width:7px;height:7px;border-radius:50%;background:${PC[t.priority]};flex-shrink:0"></span>
          <div style="flex:1;min-width:0">
            <p style="margin:0;font-size:13px;color:${t.done?'#475569':'#e2e8f0'};text-decoration:${t.done?'line-through':'none'};font-weight:500">${t.text}</p>
            ${t.time?`<p style="margin:1px 0 0;font-size:11px;color:#334155">🕐 ${t.time}</p>`:''}
          </div>
          <span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;background:${t.done?'rgba(16,185,129,.1)':'#1e293b'};color:${t.done?'#34d399':'#64748b'};white-space:nowrap">${t.done?'✓ Feito':'Pendente'}</span>

      ${sorted.length>4?`<div style="padding:9px;text-align:center"><button onclick="goTo('hoje')" style="background:none;border:none;color:#64748b;cursor:pointer;font-size:12px;font-family:inherit">+${sorted.length-4} tarefas</button></div>`:''}

}

function pageHoje(){
  const {tasks,habits,user}=APP;
  const done=tasks.filter(t=>t.done).length,pct=tasks.length?Math.round(done/tasks.length*100):0;
  const hDone=habits.filter(h=>h.done).length;
  const h=new Date().getHours();
  const greet=h<12?'Bom dia ☀️':h<18?'Boa tarde 🌤':'Boa noite 🌙';
  const PC={high:'#f87171',medium:'#fbbf24',low:'#6ee7b7'},PL={high:'Alta',medium:'Média',low:'Baixa'};
  const sorted=[...tasks].sort((a,b)=>{if(a.done!==b.done)return a.done?1:-1;return({high:0,medium:1,low:2})[a.priority]-({high:0,medium:1,low:2})[b.priority];});
  return `<div class="page-wrap">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:16px" class="fu">
      <div>
        <h1 style="margin:0;font-size:22px;font-weight:900;color:#f1f5f9">${greet}</h1>
        <p style="margin:4px 0 0;font-size:13px;color:#64748b;text-transform:capitalize">${new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'})}</p>
      </div>
      <button class="btn btn-primary btn-sm" onclick="addTask()">＋ Tarefa</button>
    </div>
    <div class="card fu" style="display:flex;align-items:center;gap:16px;margin-bottom:18px">
      ${ring(pct,58,5,pct>=80?'#10b981':pct>=50?'#8b5cf6':'#f59e0b','#1e293b',`<span style="font-size:11px;font-weight:800;color:#c4b5fd">${pct}%</span>`)}
      <div style="flex:1">
        <div style="display:flex;justify-content:space-between;margin-bottom:7px">
          <span style="font-size:13px;font-weight:600;color:#e2e8f0">${done}/${tasks.length} tarefas</span>
          <span style="font-size:12px;color:#64748b">🔥 ${hDone}/${habits.length} hábitos</span>
        </div>
        <div class="pbar-wrap"><div class="pbar" style="width:${pct}%;background:linear-gradient(90deg,#7c3aed,${pct>=80?'#10b981':'#8b5cf6'})"></div></div>
        ${pct===100?`<p style="margin:5px 0 0;font-size:12px;color:#34d399;font-weight:600">🎉 Dia perfeito, ${user.name.split(' ')[0]}!</p>`:''}
      </div>
    </div>
    ${sorted.length===0?'<div style="text-align:center;padding:40px 0;color:#475569" class="fu"><div style="font-size:44px;margin-bottom:10px">✨</div><p style="font-size:14px">Toque em "+ Tarefa" para começar!</p></div>':''}
    <div style="display:flex;flex-direction:column;gap:8px" class="fu">
      ${sorted.map(t=>`
      <div style="background:#0f172a;border:1px solid ${t.done?'rgba(16,185,129,.2)':'#1e293b'};border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:12px;transition:all .2s">
        <button onclick="toggleTask('${t.id}')" style="width:22px;height:22px;border-radius:6px;border:2px solid ${t.done?'#8b5cf6':'#334155'};background:${t.done?'#8b5cf6':'transparent'};cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;color:#fff;font-size:12px">${t.done?'✓':''}</button>
        <span style="width:7px;height:7px;border-radius:50%;background:${PC[t.priority]};flex-shrink:0" title="${PL[t.priority]}"></span>
        <div style="flex:1;min-width:0">
          <p style="margin:0;font-size:14px;font-weight:500;color:${t.done?'#475569':'#e2e8f0'};text-decoration:${t.done?'line-through':'none'}">${t.text}</p>
          ${t.time?`<p style="margin:2px 0 0;font-size:11px;color:#475569">🕐 ${t.time}</p>`:''}

        <button class="badge ${t.done?'bdone':'bpend'}" onclick="setTaskDone('${t.id}',${!t.done})">

        </button>
        <button onclick="delTask('${t.id}')" style="background:none;border:none;color:#334155;cursor:pointer;font-size:18px;padding:2px 5px;border-radius:6px;transition:color .15s" onmouseover="this.style.color='#f87171'" onmouseout="this.style.color='#334155'">×</button>
      </div>`).join('')}
    </div>
  </div>`;
}
function toggleTask(id){setApp({tasks:APP.tasks.map(t=>t.id===id?{...t,done:!t.done}:t)});saveUserData();}
function setTaskDone(id,v){setApp({tasks:APP.tasks.map(t=>t.id===id?{...t,done:v}:t)});saveUserData();}
function delTask(id){openConfirm('Remover esta tarefa?',()=>{setApp({tasks:APP.tasks.filter(t=>t.id!==id)});saveUserData();toast('Tarefa removida.','error');});}
function addTask(){
  openSheet('Nova Tarefa',`
    <div class="field"><label class="lbl">Descrição <span style="color:#f87171">*</span></label><input id="tf-text" class="inp" placeholder="Descreva a tarefa..."></div>
    <div class="field"><label class="lbl">Prioridade</label><select id="tf-pri" class="sel"><option value="high">🔴 Alta</option><option value="medium" selected>🟡 Média</option><option value="low">🟢 Baixa</option></select></div>
    <div class="field"><label class="lbl">Horário (opcional)</label><input id="tf-time" type="time" class="inp"></div>
    <p id="tf-err" class="err-msg" style="display:none">Descrição obrigatória</p>`,
    `<button class="btn btn-ghost btn-full" onclick="closeModal()">Cancelar</button>
     <button class="btn btn-primary btn-full" onclick="confirmAddTask()">Criar tarefa</button>`);
}
function confirmAddTask(){
  const text=(document.getElementById('tf-text').value||'').trim();
  if(!text){document.getElementById('tf-err').style.display='block';return;}
  setApp({tasks:[{id:uid(),text,priority:document.getElementById('tf-pri').value,time:document.getElementById('tf-time').value,done:false},...APP.tasks]});
  saveUserData();closeModal();toast('Tarefa adicionada! ✓','success');
}

const CC={Saúde:'#10b981',Financeiro:'#f59e0b',Carreira:'#8b5cf6',Conhecimento:'#3b82f6',Idiomas:'#ec4899',Pessoal:'#14b8a6',Outro:'#64748b'};

        const cc=CC[g.cat]||'#8b5cf6',st=g.status||'andamento';
        return `<div style="background:#0f172a;border:1px solid ${st==='concluido'?'rgba(16,185,129,.3)':'#1e293b'};border-radius:18px;padding:18px;position:relative;overflow:hidden">

function addGoal(){

function editGoal(id){

function confirmGoal(id){
  const title=(document.getElementById('gf-title').value||'').trim();
  const target=+document.getElementById('gf-target').value;
  const deadline=document.getElementById('gf-deadline').value;
  if(!title||!target||!deadline){document.getElementById('gf-err').style.display='block';return;}
  const current=+document.getElementById('gf-current').value||0;
  const status=document.getElementById('gf-status').value;
  const progress=status==='concluido'?100:Math.min(100,Math.round(current/target*100));
  const payload={title,icon:document.getElementById('gf-icon').value||'🎯',cat:document.getElementById('gf-cat').value,priority:document.getElementById('gf-pri').value,target,current,deadline,notes:document.getElementById('gf-notes').value,status,progress};
  if(id){setApp({goals:APP.goals.map(g=>g.id===id?{...g,...payload}:g)});toast('Meta atualizada! ✓','success');}
  else{setApp({goals:[{id:uid(),...payload},...APP.goals]});toast('Meta criada! 🎯','success');}
  saveUserData();closeModal();
}

function toggleHabit(id){setHabitDone(id,!APP.habits.find(h=>h.id===id).done);}
function setHabitDone(id,v){
  setApp({habits:APP.habits.map(h=>{if(h.id!==id)return h;const hist=[...h.history];hist[hist.length-1]=v?1:0;return{...h,done:v,history:hist,streak:v?h.streak+1:Math.max(0,h.streak-1)};})});
  saveUserData();
}
function delHabit(id){openConfirm('Remover este hábito?',()=>{setApp({habits:APP.habits.filter(h=>h.id!==id)});saveUserData();toast('Hábito removido.','error');});}
const HCOLS=['#8b5cf6','#10b981','#f59e0b','#3b82f6','#ec4899','#ef4444','#14b8a6','#f97316','#a855f7','#06b6d4'];
let _hColor='#8b5cf6';
function habitForm(h){
  return `<div class="g2">
    <div class="field"><label class="lbl">Emoji</label><input id="hf-icon" class="inp" value="${h?h.icon:'⭐'}"></div>
    <div class="field"><label class="lbl">Nome *</label><input id="hf-name" class="inp" placeholder="Ex: Meditação" value="${h?h.name:''}"></div>
  </div>
  <div class="field"><label class="lbl">Cor</label>
    <div style="display:flex;gap:7px;flex-wrap:wrap">${HCOLS.map(c=>`<button onclick="selHC('${c}')" id="hc${c.slice(1)}" style="width:30px;height:30px;border-radius:9px;background:${c};border:3px solid ${h&&h.color===c?'#fff':'transparent'};cursor:pointer;transition:border .15s"></button>`).join('')}</div>

function selHC(c){_hColor=c;HCOLS.forEach(x=>{const b=document.getElementById('hc'+x.slice(1));if(b)b.style.borderColor=x===c?'#fff':'transparent';});}
function addHabit(){
  _hColor='#8b5cf6';
  openSheet('Novo Hábito',habitForm(null),`<button class="btn btn-ghost btn-full" onclick="closeModal()">Cancelar</button><button class="btn btn-primary btn-full" onclick="confirmHabit()">Criar hábito</button>`);
}
function editHabit(id){
  const h=APP.habits.find(x=>x.id===id);_hColor=h.color;
  openSheet('Editar Hábito',habitForm(h),`<button class="btn btn-ghost btn-full" onclick="closeModal()">Cancelar</button><button class="btn btn-primary btn-full" onclick="confirmHabit('${id}')">Salvar</button>`);
}
function confirmHabit(id){
  const name=(document.getElementById('hf-name').value||'').trim();
  if(!name){document.getElementById('hf-err').style.display='block';return;}
  const payload={name,icon:document.getElementById('hf-icon').value||'⭐',color:_hColor};
  if(id){setApp({habits:APP.habits.map(h=>h.id===id?{...h,...payload}:h)});toast('Hábito atualizado! ✓','success');}
  else{setApp({habits:[...APP.habits,{id:uid(),...payload,streak:0,done:false,history:Array(14).fill(0)}]});toast('Hábito criado! 🔥','success');}
  saveUserData();closeModal();
}

function switchPerfView(mode) {
  const chart = document.getElementById('perf-chart');
  const btnD  = document.getElementById('perf-daily');
  const btnW  = document.getElementById('perf-weekly');
  if (!chart) return;

  const activeStyle  = 'background:rgba(139,92,246,.18);border:1px solid rgba(139,92,246,.4);color:#c4b5fd';
  const inactiveStyle= 'background:#1e293b;border:1px solid #334155;color:#64748b';

  if (mode === 'daily') {
    if (btnD) btnD.style.cssText += ';'+activeStyle;
    if (btnW) btnW.style.cssText += ';'+inactiveStyle;
    const daily = getPerfDailyData(14);
    chart.innerHTML = daily.length
      ? histogram(daily, ['tasks','habits','goals'], ['#8b5cf6','#10b981','#f59e0b'], ['Tarefas','Hábitos','Metas'], 180)
      : `<div style="text-align:center;padding:28px 0;color:#475569;font-size:13px">📈 Ainda sem dados diários registados.</div>`;
  } else {
    if (btnW) btnW.style.cssText += ';'+activeStyle;
    if (btnD) btnD.style.cssText += ';'+inactiveStyle;
    const weekly = getPerfHistData();
    chart.innerHTML = weekly.length >= 2
      ? histogram(weekly, ['tasks','habits','goals'], ['#8b5cf6','#10b981','#f59e0b'], ['Tarefas','Hábitos','Metas'], 180)
      : `<div style="text-align:center;padding:28px 0;color:#475569;font-size:13px">📈 Use o app por mais dias para ver a evolução semanal!</div>`;
  }
}
function updCalc(k,v){
  calcW[k]=+v;
  const {tasks,habits,goals}=APP;
  const tS=tasks.length?Math.round(tasks.filter(t=>t.done).length/tasks.length*100):0;
  const hS=habits.length?Math.round(habits.filter(h=>h.done).length/habits.length*100):0;
  const gS=goals.length?Math.round(goals.reduce((a,g)=>a+g.progress,0)/goals.length):0;
  const wT=calcW.t+calcW.h+calcW.g;
  const cS=wT>0?Math.round((tS*calcW.t+hS*calcW.h+gS*calcW.g)/wT):0;
  const cC=cS>=75?'#10b981':cS>=50?'#f59e0b':'#f87171';
  const el=document.getElementById('wl-'+k);if(el)el.textContent=calcW[k]+'%';
  const tot=document.getElementById('wtot');if(tot){tot.textContent=wT+'%'+(wT!==100?' ← 100% necessário':'');tot.style.color=wT===100?'#34d399':'#f87171';}
  const bar=document.getElementById('wbar');if(bar){bar.style.width=Math.min(wT,100)+'%';bar.style.background=wT===100?'#10b981':'#f87171';}
  const cs=document.getElementById('cscore');if(cs){cs.textContent=cS;cs.style.color=cC;}
}

// Base: https://api.lojou.app/v1
// ════════════════════════════════════════════════════

// ⚠️  CONFIGURE AQUI com suas credenciais do painel Lojou:
const LOJOU = {
  API_KEY:     'SUA_API_KEY_AQUI',           // Painel Lojou → Configurações → API Keys
  // product_pid de cada produto criado no painel Lojou:
  PRODUCTS: {
    basic:    'PID_BASICO_AQUI',             // Produto "MiVida Básico 79 MZN"
    premium:  'PID_PREMIUM_AQUI',            // Produto "MiVida Premium 119 MZN"
    lifetime: 'PID_VITALICIO_AQUI',          // Produto "MiVida Vitalício 249 MZN"
  },
  AMOUNTS: {
    basic: 79,
    premium: 119,
    lifetime: 249,
  },
};

// Pending payment state (persisted so user can return after redirect)
function getPendingOrder() { return S.get('los_pending_order', null); }
function setPendingOrder(data) { S.set('los_pending_order', data); }
function clearPendingOrder() { S.del('los_pending_order'); }

// ── 1. Criar pedido via API Lojou e redirecionar para checkout ──────────────
async function startLojouCheckout(planId) {
  if (!APP.user) return;

  // Mostrar loading
  const btn = document.getElementById('btn-plan-' + planId);
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spin-icon">⟳</span> A processar...'; }

  const phone = await askPhone(planId);
  if (!phone) {
    if (btn) { btn.disabled = false; btn.innerHTML = getPlanBtnLabel(planId); }
    return;
  }

  try {
    const res = await fetch('https://api.lojou.app/v1/orders', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${LOJOU.API_KEY}`,
      },
      body: JSON.stringify({
        amount: LOJOU.AMOUNTS[planId],
        product_pid: LOJOU.PRODUCTS[planId],
        customer: {
          name:          APP.user.name,
          email:         APP.user.email,
          mobile_number: phone,
          payment_number: phone,
        },
        return_url: window.location.href + '?payment=success&plan=' + planId,
        cancel_url:  window.location.href + '?payment=cancel',
      }),
    });

    const data = await res.json();

    if (!res.ok || !data.success) {
      toast('Erro ao criar pedido: ' + (data.message || 'Tente novamente.'), 'error');
      if (btn) { btn.disabled = false; btn.innerHTML = getPlanBtnLabel(planId); }
      return;
    }

    // Salvar pedido pendente para verificação posterior
    setPendingOrder({
      order_number: data.order_number,
      pay_token:    data.pay_token,
      plan:         planId,
      created_at:   new Date().toISOString(),
    });

    // Abrir checkout Lojou
    toast('A redirecionar para pagamento...', 'info');
    setTimeout(() => { window.location.href = data.checkout_url; }, 800);

  } catch (err) {
    toast('Erro de conexão. Verifique a internet e tente novamente.', 'error');
    if (btn) { btn.disabled = false; btn.innerHTML = getPlanBtnLabel(planId); }
    console.error('Lojou checkout error:', err);
  }
}

// ── 2. Verificar estado do pedido via API ────────────────────────────────────
async function verifyLojouOrder(orderNumber, planId) {
  try {
    const res = await fetch(`https://api.lojou.app/v1/orders/${orderNumber}`, {
      headers: { 'Authorization': `Bearer ${LOJOU.API_KEY}` },
    });
    const data = await res.json();
    if (!res.ok || !data.success) return null;
    return data.data; // { status: 'approved'|'pending'|'failed', ... }
  } catch {
    return null;
  }
}

// ── 3. Ativar plano localmente após pagamento confirmado ─────────────────────
function activatePlanLocally(planId) {
  const now = new Date();
  let expiresAt = null;
  if (planId === 'basic') {
    const e = new Date(now); e.setDate(e.getDate() + 15);
    expiresAt = e.toISOString();
  } else if (planId === 'premium') {
    const e = new Date(now); e.setMonth(e.getMonth() + 1);
    expiresAt = e.toISOString();
  }
  APP.premium = { plan: planId, activatedAt: now.toISOString(), expiresAt };
  saveUserData();
  clearPendingOrder();
}

// ── 4. Polling: verificar pedido pendente quando utilizador volta ─────────────
async function checkPendingPayment() {
  const pending = getPendingOrder();
  if (!pending) return;

  // Verificar se já passou mais de 30 min (timeout)
  const age = (Date.now() - new Date(pending.created_at).getTime()) / 60000;
  if (age > 30) { clearPendingOrder(); return; }

  const order = await verifyLojouOrder(pending.order_number, pending.plan);
  if (!order) return;

  if (order.status === 'approved' || order.status === 'paid') {
    activatePlanLocally(pending.plan);
    const names = { basic:'Básico', premium:'Premium', lifetime:'Vitalício' };
    toast(`🎉 Pagamento confirmado! Plano ${names[pending.plan]} ativado!`, 'success');
    goTo('premium');
  } else if (order.status === 'failed' || order.status === 'cancelled') {
    clearPendingOrder();
    toast('Pagamento não foi concluído. Tente novamente.', 'warning');
  }
  // Se 'pending' — aguardar
}

// ── 5. Tratar retorno via URL params (return_url) ────────────────────────────
function handleReturnFromPayment() {
  const params = new URLSearchParams(window.location.search);
  const payment = params.get('payment');
  const plan    = params.get('plan');

  if (!payment) return;

  // Limpar URL
  window.history.replaceState({}, '', window.location.pathname);

  if (payment === 'success' && plan) {
    // Verificar via API (o status pode ainda estar processando)
    toast('A verificar pagamento...', 'info');
    const pending = getPendingOrder();
    if (pending && pending.plan === plan) {
      setTimeout(async () => {
        const order = await verifyLojouOrder(pending.order_number, plan);
        if (order && (order.status === 'approved' || order.status === 'paid')) {
          activatePlanLocally(plan);
          const names = { basic:'Básico', premium:'Premium', lifetime:'Vitalício' };
          toast(`✅ Plano ${names[plan]} ativado com sucesso!`, 'success');
        } else {
          // Pagamento ainda em processamento — polling vai resolver
          toast('Pagamento em processamento. Aguarde um momento.', 'warning');
        }
        goTo('premium'); render();
      }, 2000);
    }
  } else if (payment === 'cancel') {
    toast('Pagamento cancelado. Pode tentar novamente quando quiser.', 'warning');
    goTo('premium');
  }
}

// ── Modal para pedir número de telefone/M-Pesa ──────────────────────────────
function askPhone(planId) {
  return new Promise(resolve => {
    closeModal();
    const ov = document.createElement('div');
    ov.className = 'overlay center'; ov.id = 'los-modal';
    const names = { basic:'Básico — 79 MZN', premium:'Premium — 119 MZN', lifetime:'Vitalício — 249 MZN' };
    ov.innerHTML = `<div class="confirm-box fu" style="max-width:380px">
      <div style="font-size:36px;margin-bottom:12px;text-align:center">📱</div>
      <h3 style="margin:0 0 6px;font-size:16px;font-weight:800;color:#f1f5f9;text-align:center">Pagamento via M-Pesa</h3>
      <p style="margin:0 0 16px;font-size:13px;color:#64748b;text-align:center;line-height:1.5">Plano <b style="color:#c4b5fd">${names[planId]}</b><br>Introduza o número M-Pesa para pagamento.</p>
      <div class="field">
        <label class="lbl">Número M-Pesa <span style="color:#f87171">*</span></label>
        <input id="mpesa-phone" class="inp" type="tel" placeholder="Ex: 841234567" maxlength="12"
          style="font-size:16px;text-align:center;letter-spacing:2px">
        <p style="margin:4px 0 0;font-size:11px;color:#475569">Formato: 84XXXXXXX ou 85XXXXXXX ou +258...</p>
      </div>
      <p id="phone-err" class="err-msg" style="display:none;margin-bottom:10px">Introduza um número válido</p>
      <div style="display:flex;gap:10px;margin-top:4px">
        <button class="btn btn-ghost btn-full" onclick="closeModal();resolve_phone(null)">Cancelar</button>
        <button class="btn btn-primary btn-full" onclick="confirm_phone()">Continuar →</button>
      </div>
    </div>`;
    document.body.appendChild(ov);
    // Expose resolver
    window._phone_resolve = resolve;
    setTimeout(() => { const i = document.getElementById('mpesa-phone'); if(i) i.focus(); }, 100);
  });
}
window.resolve_phone = (val) => { if (window._phone_resolve) { window._phone_resolve(val); window._phone_resolve = null; } };
window.confirm_phone = () => {
  const val = (document.getElementById('mpesa-phone').value || '').trim().replace(/\s/g,'');
  if (!val || val.length < 9) { document.getElementById('phone-err').style.display = 'block'; return; }
  // Formatar para +258 se necessário
  let phone = val;
  if (!phone.startsWith('+')) {
    phone = phone.startsWith('258') ? '+' + phone : '+258' + phone.replace(/^0/,'');
  }
  closeModal();
  window.resolve_phone(phone);
};

function getPlanBtnLabel(planId) {
  const trial = isOnTrial();
  const names = { basic:'Básico', premium:'Premium', lifetime:'Vitalício' };
  return trial ? `Continuar com ${names[planId]}` : `Assinar ${names[planId]}`;
}

// ── Verificar pedido manualmente (botão na página) ───────────────────────────
async function manualVerifyPayment() {
  const btn = document.getElementById('verify-btn');
  if (btn) { btn.disabled = true; btn.textContent = '⟳ A verificar...'; }
  await checkPendingPayment();
  if (btn) { btn.disabled = false; btn.textContent = '🔄 Verificar pagamento'; }
  render();
}

async function startApp(){

  if (data.session) {
    const u = data.session.user;
    const { data: prof } = await sb.from('profiles').select('name,created_at').eq('id', u.id).single();
    const user = { id: u.id, name: prof?.name || u.user_metadata?.name || '', email: u.email, createdAt: prof?.created_at || u.created_at };
    await loadUserData(user);
  }
  render();
}
